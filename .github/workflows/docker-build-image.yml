name: Build and push Docker image

on:
  # For the manual run.
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - 'docker/build-image/**'
      - '.github/workflows/docker-build-image.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'docker/build-image/**'
      - '.github/workflows/docker-build-image.yml'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_LOGIN || 'kasperskydh' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push the Docker image for Kaspersky Neuromorphic Platform build
        uses: docker/build-push-action@v6
        timeout-minutes: 180
        with:
          platforms: linux/amd64,linux/arm64
          context: "{{defaultContext}}:docker/build-image"
          push: ${{ github.event_name != 'pull_request' }}
          build-args: KNP_IMAGE_VERSION=latest
          tags: ${{ vars.DOCKERHUB_LOGIN || 'kasperskydh' }}/knp-build-image:latest
